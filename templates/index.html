<!DOCTYPE html>
<html>
<head>
    <title>Manikarnika Hospitals</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:450px;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:darkblue;
            text-align:center;
        }

        h2{
            text-align:center;
        }

        input,select,textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            font-size:18px;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🏥 Manikarnika Hospitals</h1>

<h2>Out Patient Appointment</h2>

<form action="/submit" method="POST">

<label>Mobile Number</label>

<input type="text" name="mobile" required>

<label>Patient Name (As per Aadhaar)</label>

<input type="text" name="name" required>

<label>Gender</label>

<select name="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<label>Age</label>

<input type="number" name="age" required>

<label>Date of Birth</label>

<input type="date" name="dob" required>

<label>Present Address</label>

<textarea name="address" rows="4"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
